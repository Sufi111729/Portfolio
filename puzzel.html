    <div class="container">

                <div style="max-width: 400px; margin: auto;">

                <div class="position-sticky" style="top: 40px">

        <h2>Sudoku Solver</h2>
        <div class="grid" id="sudoku-grid"></div>
        <button onclick="solveSudoku()">Solve</button>
        <button onclick="generateSudoku()">New Puzzle</button>
    </div>
    
    <script>
        function generateSudoku() {
            const grid = document.getElementById("sudoku-grid");
            grid.innerHTML = ""; 
            let board = Array.from({ length: 9 }, () => Array(9).fill(0));
            solve(board);
            let puzzle = board.map(row => [...row]);
            
            for (let i = 0; i < 30; i++) {
                let row = Math.floor(Math.random() * 9);
                let col = Math.floor(Math.random() * 9);
                puzzle[row][col] = 0;
            }
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    let input = document.createElement("input");
                    input.type = "number";
                    input.min = "1";
                    input.max = "9";
                    if (puzzle[i][j] !== 0) {
                        input.value = puzzle[i][j];
                        input.readOnly = true;
                        input.style.backgroundColor = "#d3d3d3";
                    }
                    grid.appendChild(input);
                }
            }
        }
        
        function getGridValues() {
            let inputs = document.querySelectorAll(".grid input");
            let board = [];
            for (let i = 0; i < 9; i++) {
                board.push([]);
                for (let j = 0; j < 9; j++) {
                    let value = inputs[i * 9 + j].value;
                    board[i].push(value ? parseInt(value) : 0);
                }
            }
            return board;
        }
        
        function setGridValues(board) {
            let inputs = document.querySelectorAll(".grid input");
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (!inputs[i * 9 + j].readOnly) {
                        inputs[i * 9 + j].value = board[i][j] ? board[i][j] : "";
                    }
                }
            }
        }
        
        function isValid(board, row, col, num) {
            for (let i = 0; i < 9; i++) {
                if (board[row][i] === num || board[i][col] === num) {
                    return false;
                }
                let boxRow = Math.floor(row / 3) * 3 + Math.floor(i / 3);
                let boxCol = Math.floor(col / 3) * 3 + (i % 3);
                if (board[boxRow][boxCol] === num) {
                    return false;
                }
            }
            return true;
        }
        
        function solve(board) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) {
                        for (let num = 1; num <= 9; num++) {
                            if (isValid(board, row, col, num)) {
                                board[row][col] = num;
                                if (solve(board)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }
        
        function solveSudoku() {
            let board = getGridValues();
            if (solve(board)) {
                setGridValues(board);
            } else {
                alert("No solution exists!");
            }
        }
        
        generateSudoku();
    </script>
